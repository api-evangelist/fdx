apis:
- name: FDX Accounts API
  description: RESTful endpoints for retrieving consumer deposit, loan, investment,
    and insurance account details including account numbers, balances, account holder
    identity, and account metadata. Supports the full FDX account data cluster across
    all account types recognized by the standard.
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://financialdataexchange.org
  baseURL: https://api.financialdataexchange.org
  tags:
  - Accounts
  - Deposit Accounts
  - Loan Accounts
  - Account Balances
  - Account Holder
  properties:
  - type: Documentation
    url: https://financialdataexchange.org
  - type: OpenAPI
    url: https://github.com/plaid/core-exchange
  - url: graphql/fdx-graphql.md
    type: GraphQL
- name: FDX Transactions API
  description: RESTful endpoints for retrieving consumer transaction histories including
    pending and posted transactions, transaction categorization, merchant data, and
    transaction amounts across deposit, loan, and investment accounts within the permissioned
    scope.
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://financialdataexchange.org
  baseURL: https://api.financialdataexchange.org
  tags:
  - Transactions
  - Transaction History
  - Pending Transactions
  - Merchant Data
  properties:
  - type: Documentation
    url: https://financialdataexchange.org
- name: FDX Investment API
  description: RESTful endpoints for retrieving investment account data including
    holdings, positions, investment transactions, cost basis, and portfolio composition.
    Covers brokerage, retirement, and managed investment accounts under the FDX investment
    data cluster.
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://financialdataexchange.org
  baseURL: https://api.financialdataexchange.org
  tags:
  - Investments
  - Holdings
  - Portfolio
  - Brokerage
  - Retirement
  properties:
  - type: Documentation
    url: https://financialdataexchange.org
- name: FDX Insurance API
  description: RESTful endpoints for retrieving insurance policy information including
    policy coverage details, premium schedules, claims history, and beneficiary data
    under the FDX insurance data cluster.
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://financialdataexchange.org
  baseURL: https://api.financialdataexchange.org
  tags:
  - Insurance
  - Policy
  - Coverage
  - Claims
  properties:
  - type: Documentation
    url: https://financialdataexchange.org
- name: FDX Tax API
  description: RESTful endpoints for retrieving consumer tax data including tax document
    metadata and structured tax form data (1099s, W-2s, and related forms) as defined
    by the FDX US Tax Data specification and the CSDF Consensus Standard Data Format.
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://financialdataexchange.org
  baseURL: https://api.financialdataexchange.org
  tags:
  - Tax Data
  - 1099
  - W-2
  - Tax Documents
  properties:
  - type: Documentation
    url: https://financialdataexchange.org
- name: FDX Payroll API
  description: RESTful endpoints introduced in FDX API v6.0 for retrieving permissioned
    payroll data including employment records, pay stubs, income verification, and
    direct deposit details, supporting lending and personal financial management use
    cases.
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://financialdataexchange.org
  baseURL: https://api.financialdataexchange.org
  tags:
  - Payroll
  - Income Verification
  - Employment
  - Pay Stubs
  properties:
  - type: Documentation
    url: https://financialdataexchange.org
- name: FDX Consent API
  description: RESTful endpoints implementing the FDX Consent API Behavioral Specification
    for managing user permissions and consent events. Enables data recipients to initiate
    consent, query active consent grants, update scope, and handle consent revocation
    in compliance with CFPB Section 1033 requirements.
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://financialdataexchange.org
  baseURL: https://api.financialdataexchange.org
  tags:
  - Consent Management
  - Authorization
  - CFPB 1033
  - Data Access
  - Permissioning
  properties:
  - type: Documentation
    url: https://financialdataexchange.org
