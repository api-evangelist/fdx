name: Financial Data Exchange (FDX)
description: Financial Data Exchange (FDX) is a non-profit industry standards body
  operating in the US and Canada that produces the FDX API, a royalty-free REST standard
  for consumer-permissioned financial data sharing. The FDX API defines interoperable
  endpoints covering deposit accounts, loan accounts, investment accounts, insurance
  policies, tax data, payroll data, reward programs, and consent management, enabling
  data providers (financial institutions), data access platforms (aggregators), and
  data recipients (fintechs) to exchange consumer financial data without exposing
  user credentials. As of early 2026 over 130 million consumer accounts are connected
  via the FDX API across 200+ member organizations including Bank of America, Chase,
  Citi, Wells Fargo, Plaid, and MX. FDX API v6.5 is the current stable release.
